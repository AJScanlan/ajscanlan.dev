const formatDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
};
const shortDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
};
const yearOf = (iso) => iso.slice(0,4);

// ─── ARCHIVE ──────────────────────────────────────────────────────────
const Archive = ({ go, initialFilter }) => {
  const [filter, setFilter] = useState(initialFilter || 'all');
  useEffect(()=>{ if(initialFilter) setFilter(initialFilter); }, [initialFilter]);

  const counts = POSTS.reduce((acc,p)=>{ acc[p.kind] = (acc[p.kind]||0)+1; return acc; }, {});
  const filtered = filter === 'all' ? POSTS : POSTS.filter(p => p.kind === filter);
  const byYear = filtered.reduce((acc, p) => {
    const y = yearOf(p.date); (acc[y] ||= []).push(p); return acc;
  }, {});
  const years = Object.keys(byYear).sort((a,b)=>b.localeCompare(a));

  const F = ({id, label}) => (
    <span className={filter===id?'on':''} onClick={()=>setFilter(id)}>
      {label}<span className="count">/ {id==='all' ? POSTS.length : (counts[id]||0)}</span>
    </span>
  );

  return (
    <main className="wrap archive">
      <h1>Archive</h1>
      <p className="lede">Everything I've published, newest first. Filter by type — project logs and technical posts are the load-bearing stuff if you're evaluating me as an engineer.</p>
      <div className="filters">
        <F id="all" label="All" />
        <F id="project-log" label="Project logs" />
        <F id="technical" label="Technical" />
        <F id="cheat-sheet" label="Cheat sheets" />
        <F id="note" label="Notes" />
        <F id="essay" label="Essays" />
      </div>

      {years.map(y => (
        <div key={y}>
          <div className="year"><h3>{y}</h3><div className="rule"></div></div>
          <div className="list">
            {byYear[y].map(p => (
              <a key={p.slug} href={'#/p/'+p.slug} className="row" onClick={(e)=>{e.preventDefault(); go('post', p.slug)}}>
                <div className="date">{p.date}</div>
                <div className={'knd'+(p.kind==='project-log'?' proj':'')}>{p.kind}</div>
                <div className="title">{p.title}</div>
                <div className="rt">{p.read}</div>
              </a>
            ))}
          </div>
        </div>
      ))}

      {filtered.length === 0 && (
        <p style={{marginTop:48, color:'var(--ink-400)', fontFamily:'var(--mono)', fontSize:13}}>Nothing here yet under that filter — check back.</p>
      )}
    </main>
  );
};

// ─── POST ─────────────────────────────────────────────────────────────
// One canonical sample. Stand-in content — easy to swap.
const Post = ({ slug, go }) => {
  const p = POSTS.find(x => x.slug === slug) || POSTS[0];
  return (
    <>
      <div className="post-progress"><div></div></div>
      <main className="wrap-prose post">
        <div className="meta">
          <a className="back" href="#/" onClick={(e)=>{e.preventDefault(); go('home')}}>← back</a>
          <span className="kind">{KIND_LABEL[p.kind]}</span>
          <span>{formatDate(p.date)}</span>
          <span>·</span>
          <span>{p.read} read</span>
        </div>

        <h1 className="post-title">{p.title}</h1>
        {p.dek && <p className="dek">{p.dek}</p>}

        <div className="callout">
          <h6>Reader's note</h6>
          <p>This is a working note, not a finished essay. I edit posts in place as I learn more — the most recent version is always what's here. If you find an error, <a href="mailto:hello@ajscanlan.dev" className="inline" style={{color:'var(--ink-900)'}}>email me</a> and I'll fix it.</p>
        </div>

        <h2><span className="num">01 — The setup</span>What I was actually trying to do</h2>
        <p>Every few months something in production behaves weirdly enough that I learn a thing I should have known years ago. This is one of those.</p>
        <p>The service is a long-running Node worker that pulls jobs off a queue, hits two external APIs, and writes results to Postgres. Boring. It runs for weeks at a time and the only thing that ever goes wrong is the database being briefly slow.</p>
        <p>Until — over about seven weeks — RSS climbed from 180 MB to 1.4 GB. Not a leak shaped like a hot loop. A slow drip, about <strong>0.4%</strong> per hour, perfectly linear, completely invisible on any 24-hour graph.</p>

        <div className="breaker"><span></span><span></span><span></span></div>

        <h2><span className="num">02 — The investigation</span>Heap snapshot diff</h2>
        <p>The fix that worked, in the end, was the textbook one: take a heap snapshot, wait, take another, diff them, find the object class that's growing without bound. Chrome DevTools makes this pleasant. Doing it on a production worker — less so.</p>
        <p>I caught it because <code>Map</code> entries kept climbing while every other object class was flat. That pointed at our per-request cache, which I had quietly assumed was bounded.</p>
        <pre><span className="c">// the bug, distilled:</span>{'\n'}<span className="k">const</span> cache = <span className="k">new</span> Map();{'\n'}<span className="k">function</span> remember(id, value) {'{'}{'\n'}  cache.set(id, value); <span className="c">// nothing ever evicts</span>{'\n'}{'}'}</pre>
        <p>Switching to <code>WeakMap</code> wasn't right either — the keys were strings. The actual fix was an LRU with a sensible cap. Embarrassing in retrospect; reassuring that the tooling found it in an afternoon.</p>

        <h3>What I'd do differently</h3>
        <p>Two things. <em>One</em>: any cache that grows with traffic gets a bound at construction time, not "later". <em>Two</em>: a single weekly metric — RSS as a percentage of last week's RSS — would have flagged this in week two instead of week seven.</p>

        <h3>What I'd still get wrong</h3>
        <p>Probably the same class of thing. The pattern I keep hitting is "this small thing won't matter at our scale" → six months and 10× the traffic later, it matters a lot. I don't have a fix for that beyond paranoia and runbooks.</p>

        <div className="post-foot">
          <a href="#/archive" onClick={(e)=>{e.preventDefault(); go('archive')}}>← all posts</a>
          <a href="mailto:hello@ajscanlan.dev">spot an error? email me</a>
        </div>
      </main>
    </>
  );
};

// ─── App / routing ────────────────────────────────────────────────────
const parseHash = () => {
  const h = (location.hash || '#/').replace(/^#/, '');
  if (h === '/' || h === '') return { route: 'home' };
  if (h.startsWith('/p/')) return { route: 'post', slug: h.slice(3) };
  if (h.startsWith('/about')) return { route: 'about' };
  if (h.startsWith('/archive')) return { route: 'archive' };
  return { route: 'home' };
};

const App = () => {
  const [state, setState] = useState(() => parseHash());
  const [archiveFilter, setArchiveFilter] = useState('all');

  useEffect(() => {
    const onHash = () => setState(parseHash());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Scroll-top on route change.
  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [state.route, state.slug]);

  const go = (route, slug, filter) => {
    if (filter) setArchiveFilter(filter);
    const target = route === 'post' ? `#/p/${slug}` :
                   route === 'home' ? '#/' : `#/${route}`;
    if (location.hash !== target) {
      location.hash = target;
    } else {
      setState({ route, slug });
    }
  };

  return (
    <>
      <Nav route={state.route} go={go} />
      {state.route === 'home'    && <Home go={go} />}
      {state.route === 'about'   && <About go={go} />}
      {state.route === 'archive' && <Archive go={go} initialFilter={archiveFilter} />}
      {state.route === 'post'    && <Post slug={state.slug} go={go} />}

      <footer>
        <div className="inner">
          <span>© 2026 A.J. Scanlan</span>
          <span>Built with Astro · <a href="https://github.com/AJScanlan/ajscanlan.dev" target="_blank" rel="noopener">source</a></span>
        </div>
      </footer>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
